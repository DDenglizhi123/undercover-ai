version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: undercover_redis
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: undercover_web
    command: sh -c "python manage.py migrate --noinput && daphne -b 0.0.0.0 -p 8000 core.asgi:application"
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - DEBUG=False
      - ALLOWED_HOSTS=* # IMPORTANT: Replace * with your actual domain name/IP for production security
      - SECRET_KEY=replace_this_with_a_secure_random_key_in_production
