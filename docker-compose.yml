version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: undercover_redis
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: undercover_web
    command: sh -c "python manage.py migrate --noinput && daphne -e ssl:8000:privateKey=/app/ssl/key.pem:certKey=/app/ssl/cert.pem core.asgi:application"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./ssl:/app/ssl:ro
    depends_on:
      - redis
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - DEBUG=False
      - ALLOWED_HOSTS=* # IMPORTANT: Replace * with your actual domain name/IP for production security
      - SECRET_KEY=replace_this_with_a_secure_random_key_in_production
